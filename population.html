<h2>人口数据</h2>
<style>

        background-color:#3498db;

<div class="chart-wrapper">
    <canvas id="popChart" width="960" height="400"></canvas>
</div>
<table id="popTable">
    <thead>
        <tr><th>省份</th><th>人口（万人）</th></tr>
    </thead>
    <tbody></tbody>
</table>
<div>
    <button class="btn-primary" id="exportCsv">导出CSV</button>
    <button class="btn-primary" id="exportExcel">导出Excel</button>
</div>
</div>

<script>
    // 2023年各省（自治区、直辖市）人口数据，单位：万人
    const provinceData = [
        {name:"北京",   pop:2186},
        {name:"天津",   pop:1386},
        {name:"河北",   pop:7560},
        {name:"山西",   pop:3490},
        {name:"内蒙古", pop:2400},
        {name:"辽宁",   pop:4259},
        {name:"吉林",   pop:2400},
        {name:"黑龙江", pop:3100},
        {name:"上海",   pop:2487},
        {name:"江苏",   pop:8510},
        {name:"浙江",   pop:6570},
        {name:"安徽",   pop:6320},
        {name:"福建",   pop:4150},
        {name:"江西",   pop:4560},
        {name:"山东",   pop:10170},
        {name:"河南",   pop:9940},
        {name:"湖北",   pop:5850},
        {name:"湖南",   pop:6640},
        {name:"广东",   pop:12600},
        {name:"广西",   pop:5050},
        {name:"海南",   pop:1020},
        {name:"重庆",   pop:3200},
        {name:"四川",   pop:8360},
        {name:"贵州",   pop:3850},
        {name:"云南",   pop:4850},
        {name:"西藏",   pop:360},
        {name:"陕西",   pop:3950},
        {name:"甘肃",   pop:2500},
        {name:"青海",   pop:620},
        {name:"宁夏",   pop:720},
        {name:"新疆",   pop:2580}
    ];

    const tbody = document.querySelector('#popTable tbody');
    provinceData.forEach(p=>{
        const tr = document.createElement('tr');
        const tdName = document.createElement('td');
        tdName.textContent = p.name;
        const tdPop = document.createElement('td');
        tdPop.textContent = p.pop;
        tr.appendChild(tdName);
        tr.appendChild(tdPop);
        tbody.appendChild(tr);
    });

    // 绘制柱状图
    function drawChart(){
        const canvas = document.getElementById('popChart');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const padding = 40;
        const data = provinceData;
        const maxPop = Math.max(...data.map(d=>d.pop));
        const barCount = data.length;
        const barWidth = (width - 2*padding) / barCount * 0.6;
        const gap = (width - 2*padding) / barCount * 0.4;

        ctx.clearRect(0,0,width,height);

        // X轴、Y轴
        ctx.beginPath();
        ctx.moveTo(padding, height-padding);
        ctx.lineTo(width-padding, height-padding);
        ctx.lineTo(padding, padding);
        ctx.strokeStyle = '#333';
        ctx.stroke();

        // Y轴刻度
        ctx.fillStyle = '#333';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        const step = Math.ceil(maxPop/5/100)*100;
        for(let i=0;i<=5;i++){
            const y = height-padding - i*(height-2*padding)/5;
            const val = i*step;
            ctx.fillText(val, padding-5, y);
            ctx.beginPath();
            ctx.moveTo(padding-3, y);
            ctx.lineTo(padding, y);
            ctx.stroke();
        }

        // 柱状图
        data.forEach((d,i)=>{
            const x = padding + gap/2 + i*(barWidth+gap);
            const barHeight = (d.pop/maxPop)*(height-2*padding);
            ctx.fillStyle = '#3498db';
            ctx.fillRect(x, height-padding-barHeight, barWidth, barHeight);
            // 省名
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.font = '12px sans-serif';
            ctx.fillText(d.name, x+barWidth/2, height-padding+15);
            // 数值
            ctx.fillText(d.pop+'万', x+barWidth/2, height-padding-barHeight-5);
        });
    }

    if(canvas := document.getElementById('popChart')){
        drawChart();
        window.addEventListener('resize',()=>{
            canvas.width = canvas.parentNode.clientWidth;
            drawChart();
        });
    }

    // 导出CSV
    document.getElementById('exportCsv').addEventListener('click',()=>{
        let csv = '省份,人口（万人）\\n';
        provinceData.forEach(p=>{
            csv += `${p.name},${p.pop}\\n`;
        });
        const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '中国省份人口数据.csv';
        a.click();
        URL.revokeObjectURL(url);
    });

    // 导出Excel（实际为CSV，Excel可直接打开）
    document.getElementById('exportExcel').addEventListener('click',()=>{
        let csv = '省份\t人口（万人）\\n';
        provinceData.forEach(p=>{
            csv += `${p.name}\t${p.pop}\\n`;
        });
        const blob = new Blob([csv],{type:'application/vnd.ms-excel;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '中国省份人口数据.xls';
        a.click();
        URL.revokeObjectURL(url);
    });
</script>
