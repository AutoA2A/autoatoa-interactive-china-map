<div class="main">
<h2>互动中国地图 - 人口数据</h2>
<p>下面展示了2023年中国各省（自治区、直辖市）的人口统计，采用柱状图和数据表两种形式，点击柱状图可快速跳转到对应省份的详情页面。</p>

<div class="chart-container">
<canvas id="popChart" height="400"></canvas>
</div>

<div class="table-card">
<table>
<thead>
<tr><th>省份</th><th>人口（万人）</th></tr>
</thead>
<tbody id="popTableBody"></tbody>
</table>
</div>

<div class="linkBox">
    <a href="map.html">返回地图</a>
    <a href="data.html">数据看板</a>
</div>
</div>

<script>
// 简化的省份人口数据（单位：万人），仅示例前十省份，实际可自行扩展
window.APP_DATA = {
    provinces:[
        {id:"beijing",name:"北京",population:2170},
        {id:"shanghai",name:"上海",population:2424},
        {id:"guangdong",name:"广东",population:12601},
        {id:"jiangsu",name:"江苏",population:8510},
        {id:"shandong",name:"山东",population:10153},
        {id:"zhejiang",name:"浙江",population:6465},
        {id:"henan",name:"河南",population:9910},
        {id:"sichuan",name:"四川",population:8360},
        {id:"hunan",name:"湖南",population:6899},
        {id:"anhui",name:"安徽",population:6324}
    ]
};

function drawChart(){
    const canvas=document.getElementById('popChart');
    const ctx=canvas.getContext('2d');
    const data=window.APP_DATA.provinces;
    const width=canvas.width=canvas.parentNode.clientWidth;
    const height=canvas.height=400;
    const padding=40;
    const maxPop=Math.max(...data.map(p=>p.population));
    const barWidth=(width-2*padding)/data.length*0.7;
    const gap=(width-2*padding)/data.length*0.3;
    // 清空
    ctx.clearRect(0,0,width,height);
    // Y轴
    ctx.beginPath();
    ctx.moveTo(padding, padding);
    ctx.lineTo(padding, height-padding);
    ctx.lineTo(width-padding, height-padding);
    ctx.strokeStyle="#333";
    ctx.stroke();
    // 刻度
    ctx.fillStyle="#333";
    ctx.textAlign="right";
    ctx.textBaseline="middle";
    const step=Math.ceil(maxPop/5/100)*100; // 取整到百
    for(let i=0;i<=5;i++){
        const y=height-padding - i*(height-2*padding)/5;
        const val=i*step;
        ctx.fillText(val, padding-5, y);
        ctx.beginPath();
        ctx.moveTo(padding-3, y);
        ctx.lineTo(padding, y);
        ctx.stroke();
    }
    // 绘制柱状
    data.forEach((p,index)=>{
        const x=padding + gap/2 + index*(barWidth+gap);
        const barHeight=(p.population/maxPop)*(height-2*padding);
        ctx.fillStyle="#2f6fed";
        ctx.fillRect(x, height-padding-barHeight, barWidth, barHeight);
        // 省份名称
        ctx.fillStyle="#000";
        ctx.textAlign="center";
        ctx.textBaseline="top";
        ctx.font="12px var(--font)";
        ctx.fillText(p.name, x+barWidth/2, height-padding+4);
        // 为柱子添加点击事件（使用 canvas 的事件代理）
        // 记录区域
        p._rect={x:x, y:height-padding-barHeight, w:barWidth, h:barHeight};
    });
}

// 表格渲染
function renderTable(){
    const tbody=document.getElementById('popTableBody');
    tbody.innerHTML='';
    window.APP_DATA.provinces.forEach(p=>{
        const tr=document.createElement('tr');
        const tdName=document.createElement('td');
        tdName.textContent=p.name;
        const tdPop=document.createElement('td');
        tdPop.textContent=p.population;
        tr.appendChild(tdName);
        tr.appendChild(tdPop);
        tbody.appendChild(tr);
    });
}

// canvas 点击跳转
function bindCanvasClick(){
    const canvas=document.getElementById('popChart');
    canvas.addEventListener('click',function(e){
        const rect=canvas.getBoundingClientRect();
        const x=e.clientX-rect.left;
        const y=e.clientY-rect.top;
        const province=window.APP_DATA.provinces.find(p=>{
            const r=p._rect;
            return r && x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h;
        });
        if(province){
            // 假设省份详情页面为 province.html?id=provinceId
            window.location.href=`province.html?id=${province.id}`;
        }
    });
}

// 初始化
function init(){
    drawChart();
    renderTable();
    bindCanvasClick();
    // 当窗口尺寸变化时重新绘制
    window.addEventListener('resize',drawChart);
}
init();
</script>
