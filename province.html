}

.linkBox a{

    padding:6px 10px;

    color:#fff;
    text-decoration:none;
    border-radius:4px;
    font-size:13px;

    .main{padding:8px;}
    section{padding:12px;}

<body>
<div class="main">
    <h2>省份详情</h2>

    <section id="provinceInfo">
        <h3 id="provName">加载中…</h3>
        <p id="provDesc"></p>
    </section>

    <section id="provinceMap">
        <h3>省份局部地图</h3>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" id="provSvg">
            <rect width="200" height="200" fill="#e0e0e0"/>
        </svg>
    </section>

    <section id="provinceChart">
        <h3>主要指标统计</h3>
        <canvas id="chartCanvas" width="400" height="200"></canvas>
    </section>

    <section id="provinceNews">
        <h3>最新新闻</h3>
        <div id="newsList">加载中…</div>
    </section>

    <div class="linkBox">
        <a id="backMap" href="map.html">返回地图</a>
        <a id="viewData" href="data.html">查看数据看板</a>
    </div>
</div>

<script>
// 模拟的本地数据（实际项目应通过 Ajax 或其它方式获取）
window.APP_DATA = {
    provinces: {
        beijing: {
            name: "北京",
            desc: "首都，北京是中国的政治、文化中心。",
            svgPath: "M50,50 L80,40 L110,60 L100,90 L70,85 Z",
            stats: {人口: 2154, GDP: 3610, 旅游: 120},
            news: [
                {title:"北京举办国际科技论坛", date:"2024-03-12", summary:"北京成功举办了年度国际科技论坛，吸引了全球顶尖专家。"},
                {title:"北京推出新公共交通卡", date:"2024-02-28", summary:"全新公交卡实现刷卡即付，提升出行便利。"}
            ]
        },
        shanghai: {
            name: "上海",
            desc: "直辖市，上海是中国的经济金融中心。",
            svgPath: "M120,70 L150,60 L180,80 L170,110 L140,105 Z",
            stats: {人口: 2424, GDP: 4300, 旅游: 200},
            news: [
                {title:"上海世博会新展馆开放", date:"2024-04-01", summary:"上海世博会新展馆正式对外开放，展示未来城市发展。"},
                {title:"上海推出绿色出行计划", date:"2024-03-20", summary:"鼓励市民使用新能源车辆，降低碳排放。"}
            ]
        },
        guangdong: {
            name: "广东",
            desc: "经济最发达的省份之一，拥有广州、深圳等大城市。",
            svgPath: "M30,130 L70,120 L110,150 L100,180 L60,175 Z",
            stats: {人口: 12600, GDP: 12000, 旅游: 350},
            news: [
                {title:"广东打造粤港澳大湾区创新走廊", date:"2024-03-15", summary:"加速区域科技合作，推动产业升级。"},
                {title:"广东省发布最新人口统计", date:"2024-02-10", summary:"最新统计显示广东人口继续保持增长。"}
            ]
        }
    }
};

function getQueryParam(key){
    const params = new URLSearchParams(location.search);
    return params.get(key);
}

(function(){
    const provId = getQueryParam('id') || 'beijing';
    const data = window.APP_DATA.provinces[provId];

    if(!data){
        document.getElementById('provName').textContent = "未知省份";
        document.getElementById('provDesc').textContent = "";
        return;
    }

    // 基本信息
    document.getElementById('provName').textContent = data.name;
    document.getElementById('provDesc').textContent = data.desc;

    // SVG 局部地图
    const svg = document.getElementById('provSvg');
    const ns = "http://www.w3.org/2000/svg";
    const path = document.createElementNS(ns,'path');
    path.setAttribute('d', data.svgPath);
    path.setAttribute('fill', getComputedStyle(document.documentElement).getPropertyValue('--primary'));
    path.setAttribute('stroke','#fff');
    path.setAttribute('stroke-width','1');
    svg.appendChild(path);

    // 简易柱状图
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const labels = Object.keys(data.stats);
    const values = Object.values(data.stats);
    const maxVal = Math.max(...values);
    const w = canvas.width, h = canvas.height;
    const pad = 40;
    const barW = (w - 2*pad) / labels.length * 0.6;

    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = '#666';
    ctx.beginPath();
    ctx.moveTo(pad, pad);
    ctx.lineTo(pad, h - pad);
    ctx.lineTo(w - pad, h - pad);
    ctx.stroke();

    labels.forEach((label,i)=>{
        const x = pad + (i + 0.5)*(w - 2*pad)/labels.length;
        const barH = (values[i]/maxVal)*(h - 2*pad);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
        ctx.fillRect(x - barW/2, h - pad - barH, barW, barH);
        ctx.fillStyle = '#000';
        ctx.font = '12px var(--font)';
        ctx.textAlign = 'center';
        ctx.fillText(label, x, h - pad + 15);
        ctx.fillText(values[i], x, h - pad - barH - 5);
    });

    // 新闻列表
    const newsContainer = document.getElementById('newsList');
    newsContainer.innerHTML = '';
    data.news.forEach(item=>{
        const div = document.createElement('div');
        div.className = 'news-item';
        div.innerHTML = `<h4>${item.title}</h4><p><small>${item.date}</small> ${item.summary}</p>`;
        newsContainer.appendChild(div);
    });

    // 链接携带省份 ID
    document.getElementById('backMap').href = `map.html?id=${provId}`;
    document.getElementById('viewData').href = `data.html?id=${provId}`;
})();
</script>
