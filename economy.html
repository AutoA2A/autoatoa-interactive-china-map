<div class="container" style="background-color:#fff;padding:16px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);margin-top:16px;">
    <h2 style="color:#2f6fed;margin-top:0;">互动中国地图 - 经济数据</h2>
    <p>选择省份后即可查看该省的 GDP、产业结构等经济指标的柱状图，并可导出为 CSV 文件。</p>

    <div class="selectBox" style="margin:16px 0;">
        <label for="provinceSelect">省份：</label>
        <select id="provinceSelect" style="padding:6px 10px;border:1px solid #e0e0e0;border-radius:4px;font-size:14px;"></select>
    </div>

        <button id="exportBtn" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;">导出 CSV</button>

<script>
// 若全局不存在数据，则使用内置完整示例（真实可用）
window.APP_DATA = window.APP_DATA || {
    "北京": {gdp: 4000, primary: 2, secondary: 30, tertiary: 68},
    "上海": {gdp: 3800, primary: 1, secondary: 28, tertiary: 71},
    "广东": {gdp: 12000, primary: 1, secondary: 25, tertiary: 74},
    "四川": {gdp: 4800, primary: 5, secondary: 35, tertiary: 60},
    "浙江": {gdp: 6500, primary: 1, secondary: 27, tertiary: 72},
    "河南": {gdp: 5400, primary: 7, secondary: 38, tertiary: 55}
};

const provinceSelect = document.getElementById('provinceSelect');
const canvas = document.getElementById('econChart');
const ctx = canvas.getContext('2d');
const exportBtn = document.getElementById('exportBtn');

// 初始化下拉框
function initSelect(){
    const provinces = Object.keys(window.APP_DATA);
    provinces.forEach(p=>{
        const opt=document.createElement('option');
        opt.value=p;
        opt.textContent=p;
        provinceSelect.appendChild(opt);
    });
    provinceSelect.addEventListener('change',drawChart);
    if(provinces.length){
        provinceSelect.value=provinces[0];
        drawChart();
    }
}

// 绘制柱状图
function drawChart(){
    const prov = provinceSelect.value;
    const data = window.APP_DATA[prov];
    if(!data) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const margin={top:40,right:30,bottom:60,left:60};
    const w=canvas.width - margin.left - margin.right;
    const h=canvas.height - margin.top - margin.bottom;

    const items=[
        {name:"GDP(亿元)",value:data.gdp, color:"#2f6fed"},
        {name:"第一产业(%)",value:data.primary, color:"#4caf50"},
        {name:"第二产业(%)",value:data.secondary, color:"#ff9800"},
        {name:"第三产业(%)",value:data.tertiary, color:"#9c27b0"}
    ];

    const maxVal = Math.max(...items.map(i=>i.value));
    const scale = h / maxVal * 0.9; // 留点空白

    // 坐标轴
    ctx.strokeStyle="#333";
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(margin.left,margin.top);
    ctx.lineTo(margin.left,margin.top+h);
    ctx.lineTo(margin.left+w,margin.top+h);
    ctx.stroke();

    // 刻度
    ctx.fillStyle="#333";
    ctx.textAlign="center";
    ctx.textBaseline="top";
    items.forEach((item,i)=>{
        const x = margin.left + (i+0.5)*(w/items.length);
        ctx.fillText(item.name, x, margin.top+h+5);
    });

    // 柱子
    const barWidth = w / items.length * 0.6;
    items.forEach((item,i)=>{
        const x = margin.left + (i+0.5)*(w/items.length) - barWidth/2;
        const barHeight = item.value * scale;
        ctx.fillStyle=item.color;
        ctx.fillRect(x, margin.top+h-barHeight, barWidth, barHeight);
        // 数值标签
        ctx.fillStyle="#000";
        ctx.textBaseline="bottom";
        ctx.fillText(item.value, x+barWidth/2, margin.top+h-barHeight-4);
    });
}

// 导出当前省份数据为 CSV
function exportCSV(){
    const prov = provinceSelect.value;
    const data = window.APP_DATA[prov];
    if(!data) return;

    const header = ["省份","GDP(亿元)","第一产业(%)","第二产业(%)","第三产业(%)"];
    const rows = [
        [prov, data.gdp, data.primary, data.secondary, data.tertiary]
    ];
    const csvContent = [header, ...rows].map(e=>e.join(",")).join("\n");
    const blob = new Blob([csvContent],{type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = prov+"_经济数据.csv";
    a.click();
    URL.revokeObjectURL(url);
}

exportBtn.addEventListener('click',exportCSV);
initSelect();
</script>
