<div class="container">
<h2>数据看板</h2>

<div class="selectBox">
    <label for="provinceSelect">选择省份：</label>
    <select id="provinceSelect"></select>
</div>

<!-- 人口柱状图 -->
<article class="container" style="background-color: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1);">
    <h3>人口（万人）</h3>
    <canvas id="popChart" width="400" height="200"></canvas>
</article>

<!-- GDP柱状图 -->
<article class="container" style="background-color: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1);">
    <h3>地区生产总值（亿元）</h3>
    <canvas id="gdpChart" width="400" height="200"></canvas>
</article>

<!-- 旅游收入柱状图 -->
<article class="container" style="background-color: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1);">
    <h3>旅游收入（亿元）</h3>
    <canvas id="tourChart" width="400" height="200"></canvas>
</article>

<div style="margin-top:24px; text-align:center;">
    <button style="background-color: #3498db; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;" id="exportBtn">导出 CSV</button>
</div>
</div>

<script>
// 决定性伪随机生成器
function seededRandom(seed) {
    return ((seed * 9301 + 49297) % 233280) / 233280;
}

// 生成省份数据（年份：2010,2015,2020,2025）
const years = [2010, 2015, 2020, 2025];
const provinceNames = [
    "北京","天津","河北","山西","内蒙古","辽宁","吉林","黑龙江","上海","江苏",
    "浙江","安徽","福建","江西","山东","河南","湖北","湖南","广东","广西",
    "海南","重庆","四川","贵州","云南","西藏","陕西","甘肃","青海","宁夏",
    "新疆","香港","澳门","台湾"
];
const provincesData = provinceNames.map((name, idx) => {
    const seed = idx + 1;
    const r = () => seededRandom(seed++);
    // 人口基准（万人） 500~2500
    const popBase = 500 + idx * 30;
    const popVals = years.map((y, i) => Math.round(popBase + r() * 200 + i * 15));
    // GDP基准（亿元） 1000~12000
    const gdpBase = 1000 + idx * 150;
    const gdpVals = years.map((y, i) => Math.round(gdpBase + r() * 800 + i * 200));
    // 旅游收入基准（亿元） 50~2000
    const tourBase = 50 + idx * 20;
    const tourVals = years.map((y, i) => Math.round(tourBase + r() * 100 + i * 30));
    return {
        name,
        pop: years.slice(),
        popVals,
        gdp: years.slice(),
        gdpVals,
        tour: years.slice(),
        tourVals
    };
});

// 下拉框初始化
const provinceSelect = document.getElementById('provinceSelect');
provinceNames.forEach((name, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = name;
    provinceSelect.appendChild(opt);
});

// 简单柱状图绘制
function drawBar(ctx, labels, data, color) {
    const w = ctx.canvas.width;
    const h = ctx.canvas.height;
    ctx.clearRect(0, 0, w, h);
    const maxVal = Math.max(...data);
    const barWidth = w / (labels.length * 1.5);
    ctx.fillStyle = color;
    labels.forEach((lbl, i) => {
        const barHeight = (data[i] / maxVal) * (h * 0.7);
        const x = (i * 1.5 + 0.5) * barWidth;
        const y = h - barHeight - 20;
        ctx.fillRect(x, y, barWidth, barHeight);
        ctx.fillStyle = '#333';
        ctx.font = '12px sans-serif';
        ctx.fillText(labels[i], x, h - 5);
        ctx.fillText(data[i], x, y - 5);
        ctx.fillStyle = color;
    });
}

// 渲染选中省份的三张图
function renderAll() {
    const idx = Number(provinceSelect.value);
    if (isNaN(idx)) return;
    const p = provincesData[idx];
    const popCtx = document.getElementById('popChart').getContext('2d');
    const gdpCtx = document.getElementById('gdpChart').getContext('2d');
    const tourCtx = document.getElementById('tourChart').getContext('2d');
    drawBar(popCtx, p.pop, p.popVals, '#3498db');
    drawBar(gdpCtx, p.gdp, p.gdpVals, '#2ecc71');
    drawBar(tourCtx, p.tour, p.tourVals, '#e67e22');
}
provinceSelect.addEventListener('change', renderAll);
renderAll(); // 初始渲染第一个省

// 导出 CSV
document.getElementById('exportBtn').addEventListener('click', () => {
    const idx = Number(provinceSelect.value);
    if (isNaN(idx)) return;
    const p = provincesData[idx];
    let csv = '年份,人口(万人),GDP(亿元),旅游收入(亿元)\n';
    p.pop.forEach((year, i) => {
        csv += `${year},${p.popVals[i]},${p.gdpVals[i]},${p.tourVals[i]}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${p.name}_数据看板.csv`;
    a.click();
    URL.revokeObjectURL(url);
});
</script>
