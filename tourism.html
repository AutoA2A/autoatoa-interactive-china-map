<body>
<div class="main">
<h2>互动中国地图 - 旅游数据</h2>
<p>选择省份后即可查看该省近五年的旅游人数（单位：万人）以及与全国平均值的对比。</p>

<div class="selectBox">
    <label for="provinceSelect">省份：</label>
    <select id="provinceSelect"></select>
</div>

<canvas id="tourismChart" width="800" height="400"></canvas>

<div class="linkBox">
    <a href="map.html">返回地图</a>
    <a href="data.html">前往数据看板</a>
</div>
</div>

<script>
// 模拟全局数据，实际项目中会在 index.html 等页面统一定义
window.APP_DATA = {
    tourism: {
        // 省份代码 -> {name, data:[{year, visitors}]}
        beijing: {name:"北京", data:[{year:2019, visitors:150},{year:2020, visitors:120},{year:2021, visitors:180},{year:2022, visitors:200},{year:2023, visitors:210}]},
        shanghai:{name:"上海", data:[{year:2019, visitors:170},{year:2020, visitors:130},{year:2021, visitors:190},{year:2022, visitors:220},{year:2023, visitors:230}]},
        guangdong:{name:"广东", data:[{year:2019, visitors:300},{year:2020, visitors:250},{year:2021, visitors:340},{year:2022, visitors:380},{year:2023, visitors:410}]},
        // 其它省份可自行添加
    },
    // 用于计算全国平均值
    getNationalAvg: function(){
        const all = [];
        for(const key in this.tourism){
            this.tourism[key].data.forEach(d=>all.push(d.visitors));
        }
        const sum = all.reduce((a,b)=>a+b,0);
        return (sum/all.length).toFixed(1);
    }
};

(function(){
    const select = document.getElementById('provinceSelect');
    const canvas = document.getElementById('tourismChart');
    const ctx = canvas.getContext('2d');

    // 填充省份下拉框
    for(const code in window.APP_DATA.tourism){
        const opt = document.createElement('option');
        opt.value = code;
        opt.textContent = window.APP_DATA.tourism[code].name;
        select.appendChild(opt);
    }

    function drawChart(provinceCode){
        const province = window.APP_DATA.tourism[provinceCode];
        const data = province.data;
        const years = data.map(d=>d.year);
        const values = data.map(d=>d.visitors);
        const avg = parseFloat(window.APP_DATA.getNationalAvg());

        // 清空
        ctx.clearRect(0,0,canvas.width,canvas.height);

        const w = canvas.width;
        const h = canvas.height;
        const padding = 50;
        const chartW = w - padding*2;
        const chartH = h - padding*2;

        // 画坐标轴
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, h-padding);
        ctx.lineTo(w-padding, h-padding);
        ctx.stroke();

        // Y 轴刻度
        const maxVal = Math.max(...values, avg) * 1.2;
        const step = Math.ceil(maxVal/5);
        ctx.fillStyle = '#333';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for(let i=0;i<=5;i++){
            const y = h - padding - (i*chartH/5);
            const val = (i*step).toFixed(0);
            ctx.fillText(val, padding-5, y);
            ctx.strokeStyle = '#e0e0e0';
            ctx.beginPath();
            ctx.moveTo(padding, y);
            ctx.lineTo(w-padding, y);
            ctx.stroke();
        }

        // X 轴刻度
        const barW = chartW / years.length * 0.6;
        const gap = chartW / years.length;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        years.forEach((yr,i)=>{
            const x = padding + i*gap + gap/2;
            ctx.fillText(yr, x, h-padding+5);
        });

        // 绘制柱状图
        ctx.fillStyle = 'var(--primary)';
        values.forEach((val,i)=>{
            const x = padding + i*gap + (gap-barW)/2;
            const barH = (val/maxVal)*chartH;
            ctx.fillRect(x, h-padding-barH, barW, barH);
        });

        // 绘制全国平均线
        const avgY = h - padding - (avg/maxVal)*chartH;
        ctx.strokeStyle = '#ff5722';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(padding, avgY);
        ctx.lineTo(w-padding, avgY);
        ctx.stroke();

        // 标注平均值
        ctx.fillStyle = '#ff5722';
        ctx.textAlign = 'right';
        ctx.fillText('全国均值 '+avg, w-padding-5, avgY-5);
    }

    // 初始绘制
    drawChart(select.value);

    // 切换省份时重绘
    select.addEventListener('change', function(){
        drawChart(this.value);
    });
})();
</script>
