  <div style="margin-top:12px;text-align:center;">
    <button style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;">重置视图</button>

  <script>
    (function(){
      const svg = document.getElementById('chinaMap');
      const wrapper = document.getElementById('mapWrapper');
      let scale = 1;
      let tx = 0, ty = 0;
      const updateViewBox = () => {
        const vb = svg.viewBox.baseVal;
        vb.x = -tx/scale;
        vb.y = -ty/scale;
        vb.width = 1000/scale;
        vb.height = 800/scale;
      };
      // Wheel zoom
      svg.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 0.1 : -0.1;
        const rect = svg.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        const zoomFactor = 1 + delta;
        tx += cx * (1 - 1/zoomFactor) * scale;
        ty += cy * (1 - 1/zoomFactor) * scale;
        scale *= zoomFactor;
        updateViewBox();
      }, {passive:false});
      // Touch pinch zoom & pan
      let touchStart = {};
      let touchDistStart = 0;
      svg.addEventListener('touchstart', e => {
        if(e.touches.length === 2){
          const p1 = e.touches[0];
          const p2 = e.touches[1];
          const dx = p2.clientX - p1.clientX;
          const dy = p2.clientY - p1.clientY;
          touchDistStart = Math.sqrt(dx*dx + dy*dy);
          touchStart = {x:(p1.clientX+p2.clientX)/2, y:(p1.clientY+p2.clientY)/2};
        } else if(e.touches.length === 1){
          const p = e.touches[0];
          touchStart = {x:p.clientX, y:p.clientY};
        }
      }, {passive:false});
      svg.addEventListener('touchmove', e => {
        e.preventDefault();
        if(e.touches.length === 2){
          const p1 = e.touches[0];
          const p2 = e.touches[1];
          const dx = p2.clientX - p1.clientX;
          const dy = p2.clientY - p1.clientY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const factor = dist / touchDistStart;
          const rect = svg.getBoundingClientRect();
          const cx = touchStart.x - rect.left;
          const cy = touchStart.y - rect.top;
          tx += cx * (1 - 1/factor) * scale;
          ty += cy * (1 - 1/factor) * scale;
          scale *= factor;
          touchDistStart = dist;
          updateViewBox();
        } else if(e.touches.length === 1){
          const p = e.touches[0];
          const dx = p.clientX - touchStart.x;
          const dy = p.clientY - touchStart.y;
          tx += dx/scale;
          ty += dy/scale;
          touchStart = {x:p.clientX, y:p.clientY};
          updateViewBox();
        }
      }, {passive:false});
      // Click province
      svg.addEventListener('click', e => {
        const target = e.target;
        if(target.classList.contains('province')){
          const name = target.getAttribute('data-name');
          const id = encodeURIComponent(name);
          window.location.href = `province.html?id=${id}`;
        }
      });
      // Reset button
      document.querySelector('button').addEventListener('click', () => {
        scale = 1; tx = 0; ty = 0;
        updateViewBox();
      });
      // Initial viewBox
      updateViewBox();
    })();
  </script>
