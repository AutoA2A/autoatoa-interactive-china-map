<style>
:root{
    --primary:#2f6fed;
    --bg:#f5f5f5;
    --card-bg:#ffffff;
    --border:#e0e0e0;
    --font:"Microsoft YaHei","微软雅黑",sans-serif;
}
body{
    margin:0;
    font-family:var(--font);
    background:var(--bg);
    padding-top:60px; /* 为自动注入的导航留出空间 */
}
.main{
    max-width:960px;
    margin:0 auto;
    padding:16px;
}
h2{
    color:var(--primary);
    margin-top:0;
}
#mapContainer{
    position:relative;
    width:100%;
    overflow:hidden;
}
svg{
    width:100%;
    height:auto;
    display:block;
}
.province{
    fill:#c0d4f7;
    stroke:#fff;
    stroke-width:0.5;
    cursor:pointer;
    transition:fill .2s;
}
.province:hover{
    fill:#a0c0f7;
}
#detailCard{
    position:absolute;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    max-width:260px;
    display:none;
    z-index:10;
}
#detailCard h3{
    margin:0 0 8px 0;
    font-size:16px;
    color:var(--primary);
}
#detailCard p{
    margin:0 0 8px 0;
    font-size:14px;
    line-height:1.4;
}
#detailCard .btn{
    display:inline-block;
    margin-right:8px;
    padding:6px 10px;
    background:var(--primary);
    color:#fff;
    text-decoration:none;
    border-radius:4px;
    font-size:13px;
}
.linkBox{
    margin-top:24px;
}
.linkBox a{
    display:inline-block;
    margin-right:12px;
    padding:8px 12px;
    background:var(--primary);
    color:#fff;
    text-decoration:none;
    border-radius:4px;
    font-size:14px;
}
@media (max-width:600px){
    #detailCard{
        font-size:13px;
    }
}
</style>

<body>
<div class="main">
<h2>互动中国地图 - 地图</h2>
<p>在地图上点击任意省份，即可查看该省的简要信息，并可快速进入「省份详情」或「数据看板」页面。</p>

<div id="mapContainer">
<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
    <!-- 简化示例路径，仅北京、上海、广东 -->
    <path id="beijing" class="province" d="M500,200 L520,190 L540,210 L530,230 L510,225 Z"
          data-name="北京" data-info="首都，北京是中国的政治、文化中心。"/>
    <path id="shanghai" class="province" d="M620,350 L640,340 L660,360 L650,380 L630,375 Z"
          data-name="上海" data-info="直辖市，上海是中国的经济金融中心。"/>
    <path id="guangdong" class="province" d="M480,560 L500,550 L520,570 L510,590 L490,585 Z"
          data-name="广东" data-info="经济最发达的省份之一，拥有广州、深圳等大城市。"/>
</svg>
<div id="detailCard"></div>
</div>

<div class="linkBox">
    <a href="index.html">返回首页</a>
    <a href="data.html">数据看板</a>
</div>
</div>

<script>
// 全局数据
window.APP_DATA = {
    beijing:{id:1,name:"北京",info:"首都，北京是中国的政治、文化中心。"},
    shanghai:{id:2,name:"上海",info:"直辖市，上海是中国的经济金融中心。"},
    guangdong:{id:3,name:"广东",info:"经济最发达的省份之一，拥有广州、深圳等大城市。"}
};

(function(){
    const card = document.getElementById('detailCard');
    const svg = document.querySelector('#mapContainer svg');
    const container = document.getElementById('mapContainer');

    function hideCard(){
        card.style.display='none';
    }

    svg.addEventListener('click',function(e){
        const target = e.target;
        if(!target.classList.contains('province')) return;
        const key = target.id;
        const data = window.APP_DATA[key];
        if(!data) return;

        const rect = target.getBoundingClientRect();
        const contRect = container.getBoundingClientRect();

        card.innerHTML = `
            <h3>${data.name}</h3>
            <p>${data.info}</p>
            <a class="btn" href="province.html?id=${data.id}">省份详情</a>
            <a class="btn" href="data.html?province=${encodeURIComponent(data.name)}">数据看板</a>
        `;

        const cardWidth = 260;
        let left = rect.left - contRect.left + 10;
        let top = rect.top - contRect.top + 10;

        if(left + cardWidth > contRect.width){
            left = contRect.width - cardWidth - 10;
        }
        if(top + card.offsetHeight > contRect.height){
            top = contRect.height - card.offsetHeight - 10;
        }

        card.style.left = left + 'px';
        card.style.top = top + 'px';
        card.style.display = 'block';
        e.stopPropagation();
    });

    document.addEventListener('click',hideCard);
})();
</script>
