    <title>互动中国地图 - 首页</title>
    <style>
        :root{
            --primary:#2f6fed;
            --bg:#f5f5f5;
            --card-bg:#ffffff;
            --border:#e0e0e0;
            --font:"Microsoft YaHei","微软雅黑",sans-serif;
        }
        body{
            margin:0;
            font-family:var(--font);
            background:var(--bg);
            padding-top:60px;/* 为系统注入的导航留出空间 */
        }
        .main{
            max-width:960px;
            margin:0 auto;
            padding:16px;
        }
        h2{
            color:var(--primary);
            margin-top:0;
        }
        #mapContainer{
            position:relative;
            width:100%;
            overflow:hidden;
        }
        svg{
            width:100%;
            height:auto;
            display:block;
        }
        .province{
            fill:#c0d4f7;
            stroke:#fff;
            stroke-width:0.5;
            cursor:pointer;
            transition:fill .2s;
        }
        .province:hover{
            fill:#a0c0f7;
        }
        #infoCard{
            position:absolute;
            background:var(--card-bg);
            border:1px solid var(--border);
            border-radius:8px;
            padding:12px;
            box-shadow:0 2px 6px rgba(0,0,0,0.2);
            max-width:250px;
            display:none;
            z-index:10;
        }
        #infoCard h3{
            margin:0 0 8px 0;
            font-size:16px;
            color:var(--primary);
        }
        #infoCard p{
            margin:0;
            font-size:14px;
            line-height:1.4;
        }
        .linkBox{
            margin-top:24px;
        }
        .linkBox a{
            display:inline-block;
            margin-right:12px;
            padding:8px 12px;
            background:var(--primary);
            color:#fff;
            text-decoration:none;
            border-radius:4px;
            font-size:14px;
        }
        @media (max-width:600px){
            #infoCard{
                font-size:13px;
            }
        }
    </style>

    <div class="main">
        <h2>互动中国地图 - 首页</h2>
        <p>点击下方中国地图的省份，即可查看该省的简要介绍。</p>

        <div id="mapContainer">
            <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
                <!-- 示例省份路径，仅北京、上海、广东 -->
                <path id="beijing" class="province" d="M500,200 L520,190 L540,210 L530,230 L510,225 Z" data-name="北京" data-info="首都，北京是中国的政治、文化中心。"></path>
                <path id="shanghai" class="province" d="M620,350 L640,340 L660,360 L650,380 L630,375 Z" data-name="上海" data-info="直辖市，上海是中国的经济金融中心。"></path>
                <path id="guangdong" class="province" d="M480,560 L500,550 L520,570 L510,590 L490,585 Z" data-name="广东" data-info="经济最发达的省份之一，拥有广州、深圳等大城市。"></path>
            </svg>
            <div id="infoCard"></div>
        </div>

        <div class="linkBox">
            <a href="map.html">进入完整地图</a>
            <a href="search.html">搜索省份</a>
        </div>
    </div>

    <script>
        (function(){
            const provinces = {
                beijing:{name:"北京",info:"首都，北京是中国的政治、文化中心。"},
                shanghai:{name:"上海",info:"直辖市，上海是中国的经济金融中心。"},
                guangdong:{name:"广东",info:"经济最发达的省份之一，拥有广州、深圳等大城市。"}
            };
            const card = document.getElementById('infoCard');
            const container = document.getElementById('mapContainer');

            function showCard(evt, data){
                const rect = container.getBoundingClientRect();
                const x = evt.clientX - rect.left + 10;
                const y = evt.clientY - rect.top + 10;
                card.style.left = x + 'px';
                card.style.top = y + 'px';
                card.innerHTML = `<h3>${data.name}</h3><p>${data.info}</p>`;
                card.style.display = 'block';
            }

            function hideCard(){
                card.style.display = 'none';
            }

            container.addEventListener('click', function(e){
                const target = e.target;
                if(target.classList.contains('province')){
                    const data = provinces[target.id];
                    if(data){
                        showCard(e, data);
                    }
                }else{
                    hideCard();
                }
                e.stopPropagation();
            });

            // 点击容器外部关闭卡片
            document.addEventListener('click', function(e){
                if(!container.contains(e.target)){
                    hideCard();
                }
            });
        })();
    </script>
