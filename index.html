    <h2>互动中国地图 - 首页</h2>
    <p>点击地图上的省份查看简要介绍，或使用下方链接进入更多功能。</p>
    <div id="mapContainer" style="position:relative;width:100%;max-width:600px;margin:0 auto;">
        <svg viewBox="0 0 960 800" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;">

            <path class="province" d="M560,300 L580,280 L600,300 L590,320 L570,330 Z" data-name="上海" data-info="中国最大城市，经济金融中心，著名外滩、陆家嘴天际线。" fill="#2ecc71" stroke="#fff" stroke-width="2" style="cursor:pointer;transition:fill 0.3s;"></path>

            <path class="province" d="M540,380 L580,360 L620,380 L600,420 L560,430 Z" data-name="江苏" data-info="长三角核心省份，经济发达，南京、苏州、无锡等城市密集。" fill="#2ecc71" stroke="#fff" stroke-width="2" style="cursor:pointer;transition:fill 0.3s;"></path>
            <path class="province" d="M580,260 L620,240 L660,260 L640,300 L600,310 Z" data-name="山东" data-info="华东重要省份，历史文化名山大省，济南、青岛为核心城市。" fill="#2ecc71" stroke="#fff" stroke-width="2" style="cursor:pointer;transition:fill 0.3s;"></path>
        </svg>
        <div id="infoCard" style="position:absolute;background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,0.1);max-width:260px;display:none;z-index:10;pointer-events:none;"></div>

<script>
(function(){
    var paths = document.querySelectorAll('.province');
    var card = document.getElementById('infoCard');
    var container = document.getElementById('mapContainer');

    paths.forEach(function(p){
        p.addEventListener('mouseenter', function(e){
            p.style.fill = '#3498db';
            card.style.display = 'block';
            card.innerHTML = '<h3 style="margin:0 0 8px;color:#333;">' + p.getAttribute('data-name') + '</h3><p style="margin:0;font-size:14px;color:#666;">' + p.getAttribute('data-info') + '</p>';
        });
        p.addEventListener('mousemove', function(e){
            var rect = container.getBoundingClientRect();
            var x = e.clientX - rect.left + 15;
            var y = e.clientY - rect.top + 15;
            if(x + 260 > rect.width) x = e.clientX - rect.left - 275;
            if(y + 100 > rect.height) y = e.clientY - rect.top - 115;
            card.style.left = x + 'px';
            card.style.top = y + 'px';
        });
        p.addEventListener('mouseleave', function(){
            p.style.fill = '#2ecc71';
            card.style.display = 'none';
        });
        p.addEventListener('click', function(){
            var name = p.getAttribute('data-name');
            window.location.href = 'map.html?id=' + encodeURIComponent(name);
        });
    });
})();
</script>
